<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Dungeon Judge Debugger</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-6 font-sans">
  <div class="max-w-4xl mx-auto">
    <header class="mb-8 text-center">
      <h1 class="text-3xl font-extrabold text-amber-500 tracking-tight">🛡️ Code Dungeon Judge Dashboard</h1>
      <p class="text-gray-400 mt-2 text-sm">Directly verify C++ compiler output, execution timeout, and hidden test cases.</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Input Panel -->
      <div class="bg-gray-800 p-5 rounded-lg border border-gray-700 shadow-lg">
        <h2 class="text-lg font-bold text-amber-400 mb-4">Submit Test Code</h2>
        <form id="judgeForm" class="space-y-4">
          <div>
            <label for="roomOrder" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Target Chamber</label>
            <select id="roomOrder" class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm text-gray-200 outline-none focus:border-amber-500">
              <option value="1">Chamber 1: The Forgotten Gate</option>
              <option value="2">Chamber 2: Crystal Cavern</option>
              <option value="7">Chamber 7: The Cipher Gate</option>
              <option value="8">Chamber 8: Dungeon Energy Network</option>
            </select>
          </div>

          <div>
            <label for="code" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">C++ Source Code</label>
            <textarea id="code" rows="12" class="w-full bg-gray-900 border border-gray-700 rounded p-3 text-sm text-gray-200 font-mono outline-none focus:border-amber-500" placeholder="#include <iostream>&#10;using namespace std;&#10;&#10;int main() {&#10;    // write code here&#10;    return 0;&#10;}"></textarea>
          </div>

          <button type="submit" id="submitBtn" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-bold py-2.5 px-4 rounded text-sm transition duration-200">
            ⚡ Run Judge
          </button>
        </form>
      </div>

      <!-- Result Panel -->
      <div class="bg-gray-800 p-5 rounded-lg border border-gray-700 shadow-lg flex flex-col">
        <h2 class="text-lg font-bold text-amber-400 mb-4">Execution Verdict</h2>
        
        <div id="statusAlert" class="hidden p-4 rounded mb-4 text-sm font-semibold flex items-center gap-2">
          <!-- Populated by JS -->
        </div>

        <div class="flex-1 flex flex-col">
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Compiler / Runner Output</label>
          <pre id="outputLog" class="flex-1 bg-gray-950 border border-gray-900 rounded p-4 text-xs font-mono text-gray-300 overflow-auto max-h-[340px] whitespace-pre-wrap">Output logs will appear here after execution...</pre>
        </div>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('judgeForm');
    const submitBtn = document.getElementById('submitBtn');
    const outputLog = document.getElementById('outputLog');
    const statusAlert = document.getElementById('statusAlert');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const code = document.getElementById('code').value;
      const roomOrder = document.getElementById('roomOrder').value;

      if (!code.trim()) {
        alert('Please write or paste C++ code.');
        return;
      }

      // Reset UI state
      submitBtn.disabled = true;
      submitBtn.innerText = '⌛ Executing inside Docker...';
      statusAlert.className = 'hidden';
      outputLog.innerText = 'Compiling and executing your C++ file inside a Docker container...';

      try {
        const res = await fetch('/judge', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, roomOrder: parseInt(roomOrder) })
        });

        const data = await res.json();

        submitBtn.disabled = false;
        submitBtn.innerText = '⚡ Run Judge';

        if (data.success) {
          outputLog.innerText = data.notes;
          
          if (data.passed) {
            statusAlert.className = 'p-4 rounded mb-4 text-sm font-semibold bg-green-950/80 text-green-400 border border-green-800 flex items-center gap-2';
            statusAlert.innerHTML = '<span>✅</span> Verdict: ACCEPTED';
          } else {
            statusAlert.className = 'p-4 rounded mb-4 text-sm font-semibold bg-red-950/80 text-red-400 border border-red-800 flex items-center gap-2';
            statusAlert.innerHTML = '<span>❌</span> Verdict: REJECTED / WRONG ANSWER';
          }
        } else {
          statusAlert.className = 'p-4 rounded mb-4 text-sm font-semibold bg-amber-950/80 text-amber-400 border border-amber-800 flex items-center gap-2';
          statusAlert.innerHTML = '<span>⚠️</span> System Error: ' + (data.message || 'Unknown error.');
          outputLog.innerText = data.message || 'Verification execution halted.';
        }
      } catch (err) {
        submitBtn.disabled = false;
        submitBtn.innerText = '⚡ Run Judge';
        statusAlert.className = 'p-4 rounded mb-4 text-sm font-semibold bg-amber-950/80 text-amber-400 border border-amber-800 flex items-center gap-2';
        statusAlert.innerHTML = '<span>⚠️</span> Connection Failed';
        outputLog.innerText = 'Could not communicate with Judge Server. Is the server running?';
      }
    });
  </script>
</body>
</html>
